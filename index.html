<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="./music.js" defer></script>
    <link rel="stylesheet" href="./music.css">
    <title>Music Player UI</title>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#0b0b0b] via-[#121212] to-[#000000] grid place-content-center gap-5">

    <h1 class="text-white text-3xl font-bold text-center">Music player</h1>

    <!-- container -->
    <div
        class="w-80 relative backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-6 shadow-[0_0_40px_rgba(0,0,0,0.6)] text-white">

        <!-- subtle glow background -->
        <div class="absolute -top-10 -left-10 w-40 h-40 bg-purple-600/20 blur-3xl rounded-full pointer-events-none"></div>

        <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-indigo-600/20 blur-3xl rounded-full pointer-events-none">
        </div>

        <!-- header -->
        <div class="flex items-center justify-between mb-6 relative z-10">
            <i class="ri-menu-2-line text-xl cursor-pointer hover:scale-110 transition"></i>
            <h3 class="font-semibold tracking-wide text-sm uppercase text-gray-300">Now Playing</h3>
            <i class="ri-search-2-line text-xl cursor-pointer hover:scale-110 transition"></i>
        </div>

        <!-- album -->
        <div class="flex justify-center relative z-10">
            <img src="" alt="img" id="songimg"  loading="lazy"
                class="w-44 h-44 object-cover rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.8)]">
        </div>

        <!-- song info -->
        <div class="text-center mt-5 relative z-10">
            <h1 class="font-bold text-lg tracking-wide" id="songname">Song Name</h1>
            <p class="text-gray-400 text-sm" id="artistname">Artist Name</p>
        </div>

        <!-- controls -->
        <!-- progress bar -->
        <div class="mt-4 z-10">
            <input id="progress" aria-label="range" type="range" value="0" min="0" max="100"
                class="w-full h-1 bg-white/20 rounded-lg appearance-none pointer-events-none">

            <div class="flex justify-between text-xs mt-1 text-gray-300">
                <span id="currenttime">00:00</span>
                <span id="duration">00:00</span>
            </div>
        </div>

        <!-- controls -->
        <div class="flex justify-center items-center gap-7 mt-7 text-xl">

            <span>
                <i id="volume" class="ri-volume-up-fill cursor-pointer hover:scale-110 transition z-10"></i>
            </span>

            <span>
                <i id="prevbtn" class="ri-rewind-mini-fill cursor-pointer hover:scale-110 transition"></i>
            </span>

            <span>
                <i id="playbtn" class="ri-play-fill text-2xl cursor-pointer hover:scale-110 transition"></i>
            </span>

            <span>
                <i id="nextbtn" class="ri-speed-mini-fill cursor-pointer hover:scale-110 transition"></i>
            </span>
            <span>
                <i id="shufflebtn" class="ri-shuffle-fill text-lg cursor-pointer hover:scale-110 transition"></i>
            </span>

        </div>

        <audio id="audio" src="./music.mp3"></audio>
    </div>

</body>

</html>
